<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>영화순위</h1>
    <ul class="list"></ul>
    <script>
      const list = document.querySelector(".list");

      async function getMovieData(url) {
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("요청 실패 : " + response.status);
        }

        const movieData = await response.json();
       
        if (!movieData || movieData.length === 0) {
          throw new Error("데이터가 없습니다.");
        }

        return movieData.articleList;
      }

      function showMovieData(movieData) {
        console.log(movieData);
        const movieObj = movieData.map((movieData, index) => ({
          title: movieData.title,
          rank: index + 1,
        }));

        for (movie of movieObj) {
          const li = document.createElement("li");
          li.textContent = `[${movie.rank}위] ${movie.title}`;
          list.appendChild(li);
        }
      }

      async function movies() {
        try {
          const url = "http://raw.githubusercontent.com/wapj/jsbackend/main/movieinfo.json";
          const movieData = await getMovieData(url);
          showMovieData(movieData);
        } catch (e) {
          console.error("오류 발생 ", e);
        }
      }

      movies();
    </script>
  </body>
</html>
